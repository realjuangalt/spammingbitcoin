<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>{{ title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c0a08; --fg: #f5e6c8; --accent: #f7931a; --muted: #9a8b70;
      --pad: clamp(1rem, 3vw, 2.5rem); --shell: min(28rem, 100%);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100dvh;
      font-family: "IBM Plex Mono", ui-monospace, monospace;
      background: var(--bg); color: var(--fg);
      display: flex; justify-content: center;
      padding: max(var(--pad), env(safe-area-inset-top))
               max(var(--pad), env(safe-area-inset-right))
               max(var(--pad), env(safe-area-inset-bottom))
               max(var(--pad), env(safe-area-inset-left));
      background-image: radial-gradient(ellipse 80% 50% at 50% -10%, #2a1c0c 0%, transparent 55%);
    }
    .shell { width: var(--shell); padding-block: 0.5rem; }
    h1 { margin: 0 0 0.75rem; color: var(--accent); font-size: clamp(1.55rem, 1.3rem + 1.5vw, 2rem); word-break: break-word; }
    p { margin: 0 0 0.65rem; color: var(--muted); line-height: 1.5; font-size: 0.92rem; }
    code { color: var(--accent); font-size: 0.9em; word-break: break-all; }
    .n {
      font-size: clamp(1.75rem, 1.4rem + 2vw, 2.4rem); color: var(--accent); font-weight: 700;
      font-variant-numeric: tabular-nums; margin: 1rem 0;
    }
    a { color: var(--accent); }
  </style>
</head>
<body class="has-site-masthead">
  {% include "partials/masthead.html" %}

  <main class="shell">
    <h1>{{ pub.display_name }}</h1>
    <p>publisherId: <code>{{ pub.id }}</code></p>
    <p class="n">{{ pub.share_units }} share units</p>
    <p>{{ pub.tbtc_sats }} sats accrued (custodial)</p>
    <p><a href="/">← Enroll</a></p>
  </main>
</body>
</html>
